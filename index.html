<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Commander Tracker Pro</title>
<style>
body{
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
  color:#eee;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h1{text-align:center;margin-bottom:25px}

.logoContainer{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
  animation: floatLogo 3s ease-in-out infinite;
}

.logoContainer img{
  width:420px;
  max-width:100%;
  height:auto;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
  animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
  0%,100%{ transform: translateY(0px); }
  50%{ transform: translateY(-5px); }
}

.avatarContainer{
  position: relative;
  width: 100%;
  height: 500px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  border-radius:12px;
  overflow:hidden;
  margin-left: -15px;
  margin-right: -15px;
  width: 100%;
  border-radius:12px 12px 0 0;
  margin: 0
}

.playerAvatar{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  object-position: center 0%;
  transform: scale(1.2);
}

.cardImage{
  position:absolute;
  width:100px;
  z-index:2;
  transform: translateY(-20px) scale(1.05);
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
  transition: transform 0.2s;
  transform: translateY(110px) scale(1.1);
  filter: drop-shadow(0 0 15px rgba(0,0,0,1));
}

.cardImage:hover{
  transform: translateY(5px) scale(1.15);
}

.playerNameBar{
  margin-top:10px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  font-size:20px; /* 🔥 más grande */
  text-align:center;
  width:100%;
  margin:0;
  border-radius:0;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card{
  background:#1c1c2b;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.playerCard select{
  width:100%;
  text-align:center;
  margin:0 auto;
  display:block;
}

.playerCard{
  position:relative;
  overflow:visible;
  display:flex;
  flex-direction:column;
  align-items:center;
}

body{
  font-family:Arial;
  background: url("wallpaper.png") no-repeat center center fixed;
  background-size: cover;
  color:#eee;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:linear-gradient(45deg,#6c5ce7,#a29bfe);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{transform:scale(1.05)}

#playersList{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:15px;
}

.playerCard{
  padding:0;
  overflow:hidden;
}

.playerCard{
  background:#2a2a3d;
  border-radius:12px;
  padding:15px;
  text-align:center;
  position:relative;
  padding:0;
  overflow:hidden;
}

.playerCard > img{
  width:100px;
  border-radius:10px;
}

.playerCardContent{
  padding:0px;
}

.playerName{font-size:18px;font-weight:bold}

.podium{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:15px;
  margin-top:10px;
}

.podiumCard{
  background:#2a2a3d;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.podiumCard:nth-child(1){
  border:2px solid gold;
}

.podiumCard:nth-child(2){
  border:2px solid silver;
}

.podiumCard:nth-child(3){
  border:2px solid #cd7f32;
}

.medal{
  font-size:24px;
  margin-bottom:5px;
}

.name{
  font-weight:bold;
  font-size:16px;
}

.score{
  font-size:14px;
}

.wr{
  font-size:12px;
  opacity:0.7;
}

.winner input{transform:scale(1.5)}

.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.small{font-size:12px;opacity:.7}

#suggestions{
  background:#222;
  border-radius:8px;
  margin-top:5px;
  max-height:150px;
  overflow:auto;
}

#suggestions div:hover{background:#444}

.topBar{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-bottom:20px;
}

.topItem{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
}

.topItem input{
  flex:1;
}

#suggestions{
  position:absolute;
  top:45px;
  background:#222;
  border-radius:8px;
  max-height:150px;
  overflow:auto;
  width:250px;
  z-index:10;
}

</style>
</head>
<body>

<div class="logoContainer">
  <img src="logo.png" alt="Commander Tracker">
</div>

<div class="topBar">

  <div class="topItem">
    <input id="playerName" placeholder="Jugador">
    <button onclick="addPlayer()">+ Jugador</button>
  </div>

  <div class="topItem">
    <input id="commanderName" placeholder="Comandante" oninput="searchCommander()">
    <button onclick="addCommander()">+ Cmd</button>
    <div id="suggestions"></div>
  </div>

</div>

<div class="card">
<h2>Partida</h2>
<div id="playersList"></div>
<button onclick="saveGame()">Guardar partida</button>
</div>

<div class="card">
<h2>Ranking jugadores</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Ranking comandantes</h2>
<div id="commanderStats"></div>
</div>

<div class="card">
<h2>Historial</h2>
<button onclick="clearHistory()">🧨 Borrar todo</button>
<div id="history"></div>
</div>

<div class="card">
<h2>Datos</h2>
<button onclick="exportData()">Exportar</button>
<input type="file" onchange="importData(event)">
</div>

<script>
let players = JSON.parse(localStorage.getItem("players"))||[];
let commanders = JSON.parse(localStorage.getItem("commanders"))||[];
let games = JSON.parse(localStorage.getItem("games"))||[];

function clearHistory(){
  if(!confirm("¿Borrar TODO el historial?")) return;

  players.forEach(p=>{
    p.wins = 0;
    p.losses = 0;
  });

  commanders.forEach(c=>{
    c.wins = 0;
    c.losses = 0;
  });

  games = [];

  save();
  render();
}

function getPlayerImage(name){
  const images = {
    "Tato": {src:"Tatosinfondo.png", pos:"center 10%"},
    "Carlos": {src:"carlosnigrosinfondo.png", pos:"center 15%"},
    "Simón": {src:"simonsinfondo.png", pos:"center 20%"}
  };

  return images[name] || {src:"", pos:"center"};
}

function recalcStats(){
  // reset
  players.forEach(p=>{
    p.wins = 0;
    p.losses = 0;
  });

  commanders.forEach(c=>{
    c.wins = 0;
    c.losses = 0;
  });

  // recalcular desde historial
  games.forEach(g=>{
    g.players.forEach(p=>{
      let player = players.find(x => x.name === p.player);
      let cmd = commanders.find(c => c.name === p.commander);

      if(player){
        if(p.result) player.wins++;
        else player.losses++;
      }

      if(cmd){
        if(p.result) cmd.wins++;
        else cmd.losses++;
      }
    });
  });
}

function save(){
localStorage.setItem("players",JSON.stringify(players));
localStorage.setItem("commanders",JSON.stringify(commanders));
localStorage.setItem("games",JSON.stringify(games));
}

function addPlayer(){
let name=playerName.value;
if(!name)return;
players.push({id:Date.now(),name,wins:0,losses:0});
save();render();
}

function addCommander(){
  let name = commanderName.value;
  if(!name) return;

  fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`)
    .then(r => r.json())
    .then(d => {
      let image = "";
      if(d.image_uris){ image = d.image_uris.normal; }
      else if(d.card_faces && d.card_faces[0].image_uris){ image = d.card_faces[0].image_uris.normal; }

      commanders.push({id: Date.now(),name: d.name,image,wins:0,losses:0});
      save();render();
    })
    .catch(() => alert("No encontrado"));
}

function render(){
recalcStats();
let container=document.getElementById("playersList");
container.innerHTML="";

players.slice(0,3).forEach(p=>{
  let card=document.createElement("div");
  card.className="playerCard";

  let select=document.createElement("select");

  commanders.forEach(c=>{
    let o=document.createElement("option");
    o.value=c.id;
    o.textContent=c.name;
    select.appendChild(o);
  });

  let win=document.createElement("input");
  win.type="radio";
  win.name="winner";
  win.value=p.id;

let data = getPlayerImage(p.name);

card.innerHTML = `
  <div class="avatarContainer">
    <img class="playerAvatar" src="${data.src}" style="object-position:${data.pos}">
    <img class="cardImage" src="">
  </div>

  <div class="playerNameBar">${p.name}</div>
`;

let img = card.querySelector(".cardImage");

img.src = commanders.length ? commanders[0].image : "";

select.onchange = () => {
  let cmd = commanders.find(c => c.id == select.value);
  img.src = cmd?.image || "";
};

  card.appendChild(select);

  let winBox=document.createElement("div");
  winBox.innerHTML="🏆";
  winBox.appendChild(win);

  card.appendChild(winBox);

  container.appendChild(card);
});

renderStats();
renderCommanderStats();
renderHistory();
}

function saveGame(){
let cards=document.querySelectorAll(".playerCard");
let game={id:Date.now(),date:new Date().toLocaleString(),players:[]};

cards.forEach(c=>{
let name = c.querySelector(".playerNameBar").textContent;
let p=players.find(x=>x.name===name);
let cmdId=c.querySelector("select").value;
let cmd=commanders.find(c=>c.id==cmdId);
let win=c.querySelector("input").checked;

if(win){p.wins++;cmd.wins++;}
else{p.losses++;cmd.losses++;}

game.players.push({
  player: p.name,
  playerId: p.id,
  commander: cmd.name,
  commanderId: cmd.id,
  result: win
});
});

games.push(game);
save();render();
}

function renderStats(){
  let div = stats;
  div.innerHTML = "";

  let sorted = [...players].sort((a,b)=>b.wins-a.wins).slice(0,3);

  let container = document.createElement("div");
  container.className = "podium";

  const medals = ["🥇","🥈","🥉"];

  sorted.forEach((p,i)=>{
    let total = p.wins + p.losses;
    let wr = total ? ((p.wins/total)*100).toFixed(1) : 0;

    let card = document.createElement("div");
    card.className = "podiumCard";

    card.innerHTML = `
      <div class="medal">${medals[i]}</div>
      <div class="name">${p.name}</div>
      <div class="score">${p.wins}W / ${p.losses}L</div>
      <div class="wr">${wr}% WR</div>
    `;

    container.appendChild(card);
  });

  div.appendChild(container);
}

function renderCommanderStats(){
let div=commanderStats;div.innerHTML="";
commanders.sort((a,b)=>b.wins-a.wins);
commanders.forEach(c=>{
let total=c.wins+c.losses;
let wr=total?((c.wins/total)*100).toFixed(1):0;
div.innerHTML+=`<div class="row"><img src="${c.image}" width="40"> ${c.name} - ${c.wins}W/${c.losses}L (${wr}%) <button onclick="deleteCommander(${c.id})">🗑</button></div>`;
});
}

function renderHistory(){
  let div = document.getElementById("history");
  div.innerHTML = "";

  games.slice().reverse().forEach(g=>{
    div.innerHTML += `
      <div class="small">
        ${g.date}
        <button onclick="deleteGame(${g.id})" style="float:right">🗑</button>
      </div>
    `;

    g.players.forEach(p=>{
      div.innerHTML += `<div>${p.player} - ${p.commander} ${p.result ? "🏆" : ""}</div>`;
    });

    div.innerHTML += "<hr>";
  });
}

function deleteGame(id){
  if(!confirm("¿Eliminar esta partida?")) return;

  let game = games.find(g => g.id === id);
  if(!game) return;

  game.players.forEach(p=>{
    let player = players.find(x => x.id === p.playerId) || players.find(x => x.name === p.player);
    let cmd = commanders.find(c => c.id === p.commanderId) || commanders.find(c => c.name === p.commander);

    if(player){
      if(p.result) player.wins = Math.max(0, player.wins - 1);
      else player.losses = Math.max(0, player.losses - 1);
    }

    if(cmd){
      if(p.result) cmd.wins = Math.max(0, cmd.wins - 1);
      else cmd.losses = Math.max(0, cmd.losses - 1);
    }
  });

  games = games.filter(g => g.id !== id);

  save();
  render();
}

function deleteCommander(id){
if(!confirm("¿Borrar este comandante?")) return;
commanders = commanders.filter(c => c.id !== id);
save();render();
}

function exportData(){
const data={players,commanders,games};
const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;a.download="mtg-tracker.json";a.click();
}

function importData(event){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=e=>{
const data=JSON.parse(e.target.result);
players=data.players||[];
commanders=data.commanders||[];
games=data.games||[];
save();render();
};
reader.readAsText(file);
}

let debounceTimer;
function searchCommander(){
clearTimeout(debounceTimer);
debounceTimer=setTimeout(()=>{
const query=commanderName.value;
if(query.length<2){suggestions.innerHTML="";return;}
fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`)
.then(r=>r.json())
.then(data=>{
const box=document.getElementById("suggestions");
box.innerHTML="";
data.data.slice(0,5).forEach(name=>{
const div=document.createElement("div");
div.textContent=name;
div.style.cursor="pointer";
div.style.padding="6px";
div.onclick=()=>{commanderName.value=name;box.innerHTML="";};
box.appendChild(div);
});
});
},250);
}

render();
</script>

</body>
</html>
