<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Commander Tracker Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Uncial+Antiqua&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
      color: #eee;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px
    }

    .logoContainer {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      animation: floatLogo 3s ease-in-out infinite;
    }

    h2 {
      font-family: 'Uncial Antiqua', serif;
      letter-spacing: 1px;
    }

    body {
      font-family: 'Cinzel', serif;

    }

    .podiumCard .name {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .logoContainer img {
      width: 420px;
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.8));
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .commanderGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 15px;
    }

    .commanderCard {
      background: #1b1b2a;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s;
    }

    .commanderCard:hover {
      transform: scale(1.05);
    }

    .commanderCard img {
      width: 100%;
      border-radius: 8px;
    }

    .commanderTop {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .commanderTop .commanderCard {
      transform: scale(1.05);
      border: 2px solid gold;
    }

    .commanderTop .commanderCard:nth-child(2) {
      border: 2px solid silver;
    }

    .commanderTop .commanderCard:nth-child(3) {
      border: 2px solid #cd7f32;
    }

    .avatarContainer {
      position: relative;
      width: 100%;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-radius: 12px;
      overflow: hidden;
      margin-left: -15px;
      margin-right: -15px;
      width: 100%;
      border-radius: 12px 12px 0 0;
      margin: 0;
      position: relative;
    }

    .playerAvatar {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      object-position: center 0%;
      transform: scale(1.2);
    }

    .cardImage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 40%) scale(1.1);
      /* 🔥 centrado real */

      width: 120px;
      z-index: 2;
      filter: drop-shadow(0 0 15px rgba(0, 0, 0, 1));
      transition: transform 0.2s;
      animation: floatCard 3s ease-in-out infinite;
    }

    .cardImage:hover {
      transform: translate(-50%, 40%) scale(1.2) rotate(2deg);
    }

    .playerNameBar {
      margin-top: 10px;
      background: #111827;
      padding: 14px 10px;
      font-weight: bold;
      font-size: 24px;
      /* 🔥 más grande */
      text-align: center;
      width: 100%;
      margin: 0;
      border-radius: 0;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #1c1c2b;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .playerCard select {
      width: 100%;
      text-align: center;
      margin: 0 auto;
      display: block;
    }

    .playerCard {
      position: relative;
      overflow: visible;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body {
      font-family: Arial;
      background: url("wallpaper.png") no-repeat center center fixed;
      background-size: cover;
      color: #eee;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    input,
    select,
    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .selectedDelete {
      outline: 3px solid red;
      transform: scale(1.05);
      opacity: 0.7;
    }

    button {
      background: linear-gradient(45deg, #6c5ce7, #a29bfe);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05)
    }

    #playersList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .playerCard {
      padding: 0;
      overflow: hidden;
    }

    .playerNameBar {
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .playerNameBar input {
      background: transparent;
      border: none;
      color: white;
      text-align: center;
      width: 100%;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .playerCard {
      background: #2a2a3d;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      position: relative;
      padding: 0;
      overflow: hidden;
    }

    .playerCard>img {
      width: 100px;
      border-radius: 10px;
    }

    .playerCardContent {
      padding: 0px;
    }

    .playerName {
      font-size: 18px;
      font-weight: bold
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 10px;
    }

    .podiumCard {
      background: #2a2a3d;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .podiumCard:nth-child(1) {
      border: 2px solid gold;
    }

    .podiumCard:nth-child(2) {
      border: 2px solid silver;
    }

    .podiumCard:nth-child(3) {
      border: 2px solid #cd7f32;
    }

    .medal {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .score {
      font-size: 14px;
    }

    .wr {
      font-size: 12px;
      opacity: 0.7;
    }

    .winner input {
      transform: scale(1.5)
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row input {
      width: 140px;
    }

    .row button {
      min-width: 40px;
    }

    .small {
      font-size: 12px;
      opacity: .7
    }

    #suggestions {
      background: #222;
      border-radius: 8px;
      margin-top: 5px;
      max-height: 150px;
      overflow: auto;
    }

    #suggestions div:hover {
      background: #444
    }

    .topBar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .topItem {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .topItem input {
      flex: 1;
    }

    #suggestions {
      position: absolute;
      top: 100%;
      /* justo debajo del input */
      left: 0;
      width: 100%;
      background: #222;
      border-radius: 8px;
      max-height: 150px;
      overflow: auto;
      z-index: 999;
      /* para que quede por encima */
    }
  </style>
</head>

<body>

  <div class="logoContainer">
    <img src="logo.png" alt="Commander Tracker">
  </div>

  <div class="card">
    <h2>Partida</h2>

    <div id="playersList"></div>

    <div class="row" style="justify-content:center; margin-top:15px;">

      <input id="playerName" placeholder="Jugador">
      <button onclick="addPlayer()">+</button>

      <div style="position:relative;">
        <input id="commanderName" placeholder="Comandante" onkeyup="searchCommander()">
        <div id="suggestions"></div>
      </div>

      <button onclick="addCommander()">+</button>

      <button onclick="saveGame()" style="background:linear-gradient(45deg,#00b894,#55efc4);">
        Guardar partida
      </button>

    </div>

    <button onclick="toggleDeleteMode()" id="deleteBtn">
      🗑 Borrar comandantes
    </button>

    <div class="card">
      <h2>Ranking jugadores</h2>
      <div id="stats"></div>
    </div>

    <div class="card">
      <h2>Ranking comandantes</h2>
      <div id="commanderStats"></div>
    </div>

    <div class="card">
      <h2>Historial</h2>
      <button onclick="clearHistory()">🧨 Borrar todo</button>
      <div id="history"></div>
    </div>

    <div class="card">
      <h2>Datos</h2>
      <button onclick="exportData()">Exportar</button>
      <input type="file" onchange="importData(event)">
    </div>

    <script>
      let players = JSON.parse(localStorage.getItem("players")) || [];
      let commanders = JSON.parse(localStorage.getItem("commanders")) || [];
      let games = JSON.parse(localStorage.getItem("games")) || [];
      let deleteMode = false;
      let selectedCommanders = new Set();

      function toggleDeleteMode() {
        deleteMode = !deleteMode;
        selectedCommanders.clear();

        document.getElementById("deleteBtn").textContent = deleteMode
          ? "✅ Confirmar borrado"
          : "🗑 Borrar comandantes";

        if (!deleteMode) return;

        // Si ya está activo y se pulsa otra vez → borrar
        if (deleteMode && selectedCommanders.size > 0) {
          if (!confirm("¿Borrar comandantes seleccionados?")) return;

          commanders = commanders.filter(c => !selectedCommanders.has(c.id));

          save();
          render();

          deleteMode = false;
          selectedCommanders.clear();
          document.getElementById("deleteBtn").textContent = "🗑 Borrar comandantes";
        }

        render();
      }

      function clearHistory() {
        if (!confirm("¿Borrar TODO el historial?")) return;

        players.forEach(p => {
          p.wins = 0;
          p.losses = 0;
        });

        commanders.forEach(c => {
          c.wins = 0;
          c.losses = 0;
        });

        games = [];

        save();
        render();
      }

      function getPlayerImage(name) {
        const images = {
          "Tato": { src: "Tatosinfondo.png", pos: "center 10%" },
          "Carlos": { src: "carlosnigrosinfondo.png", pos: "center 15%" },
          "Simón": { src: "simonsinfondo.png", pos: "center 20%" }
        };

        return images[name] || { src: "", pos: "center" };
      }

      function recalcStats() {
        // reset
        players.forEach(p => {
          p.wins = 0;
          p.losses = 0;
        });

        commanders.forEach(c => {
          c.wins = 0;
          c.losses = 0;
        });

        // recalcular desde historial
        games.forEach(g => {
          g.players.forEach(p => {
            let player = players.find(x => x.name === p.player);
            let cmd = commanders.find(c => c.name === p.commander);

            if (player) {
              if (p.result) player.wins++;
              else player.losses++;
            }

            if (cmd) {
              if (p.result) cmd.wins++;
              else cmd.losses++;
            }
          });
        });
      }

      function save() {
        localStorage.setItem("players", JSON.stringify(players));
        localStorage.setItem("commanders", JSON.stringify(commanders));
        localStorage.setItem("games", JSON.stringify(games));
      }

      function addPlayer() {
        let name = playerName.value;
        if (!name) return;
        players.push({ id: Date.now(), name, wins: 0, losses: 0 });
        save(); render();
      }

      function addCommander() {
        let name = commanderName.value;
        if (!name) return;

        fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`)
          .then(r => r.json())
          .then(d => {
            let image = "";
            if (d.image_uris) { image = d.image_uris.normal; }
            else if (d.card_faces && d.card_faces[0].image_uris) { image = d.card_faces[0].image_uris.normal; }

            commanders.push({ id: Date.now(), name: d.name, image, wins: 0, losses: 0 });
            save(); render();
          })
          .catch(() => alert("No encontrado"));
      }

      function updatePlayerName(i, name) {
        players[i].name = name;
      }

      function render() {
        recalcStats();
        let container = document.getElementById("playersList");
        container.innerHTML = "";

        players.slice(0, 3).forEach((p, i) => {

          let data = getPlayerImage(p.name);

          container.innerHTML += `
  <div class="playerCard">

    <div class="avatarContainer">
      <img class="playerAvatar" src="${data.src}" style="object-position:${data.pos}">
      <img id="card-${i}" class="cardImage" src="">
    </div>

    <div class="playerNameBar">
      <input 
        value="${p.name}" 
        onchange="updatePlayerName(${i}, this.value)"
        style="background:none;border:none;color:white;text-align:center;font-weight:bold;width:100%"
      >
    </div>

    <select onchange="updateCommander(${i}, this.value)">
  ${commanders.map(c => `
    <option value="${c.id}" ${p.commander == c.id ? "selected" : ""}>
      ${c.name}
    </option>
  `).join("")}
</select>

    <div>
      🏆 <input type="radio" name="winner" value="${p.id}">
    </div>

  </div>
`;

          let cmd = commanders.find(c => c.id == p.commander);
          if (cmd) {
            requestAnimationFrame(() => {
              let img = document.getElementById(`card-${i}`);
              if (img) img.src = cmd.image;
            });
          }

        }); // ← cierra forEach

        renderStats();
        renderCommanderStats();
        renderHistory();

      } //  

      function saveGame() {
        let cards = document.querySelectorAll(".playerCard");
        let game = { id: Date.now(), date: new Date().toLocaleString(), players: [] };

        cards.forEach(c => {
          let name = c.querySelector(".playerNameBar input").value;
          let p = players.find(x => x.name === name);
          let cmdId = c.querySelector("select").value;
          let cmd = commanders.find(c => c.id == cmdId);
          if (!cmd) return;
          let win = c.querySelector("input").checked;

          if (win) {
            p.wins++;
            if (cmd) cmd.wins++;
          } else {
            p.losses++;
            if (cmd) cmd.losses++;
          }

          game.players.push({
            player: p.name,
            playerId: p.id,
            commander: cmd.name,
            commanderId: cmd.id,
            result: win
          });
        });

        games.push(game);
        save(); render();
      }

      function renderStats() {
        let div = document.getElementById("stats");
        div.innerHTML = "";

        let sorted = [...players].sort((a, b) => b.wins - a.wins).slice(0, 3);

        let container = document.createElement("div");
        container.className = "podium";

        const medals = ["🥇", "🥈", "🥉"];

        sorted.forEach((p, i) => {
          let total = p.wins + p.losses;
          let wr = total ? ((p.wins / total) * 100).toFixed(1) : 0;

          let card = document.createElement("div");
          card.className = "podiumCard";

          card.innerHTML = `
      <div class="medal">${medals[i]}</div>
      <div class="name">${p.name}</div>
      <div class="score">${p.wins}W / ${p.losses}L</div>
      <div class="wr">${wr}% WR</div>
    `;

          container.appendChild(card);
        });

        div.appendChild(container);
      }

      function updateCommander(i, commanderId) {
        players[i].commander = commanderId;

        let cmd = commanders.find(c => c.id == commanderId);
        let img = document.getElementById(`card-${i}`);

        if (cmd && img) {
          img.src = cmd.image;
        }
      }

      function renderCommanderStats() {
        let div = document.getElementById("commanderStats");
        div.innerHTML = "";

        let sorted = [...commanders].sort((a, b) => b.wins - a.wins);

        let top = sorted.slice(0, 3);
        let rest = sorted.slice(3);

        // 🥇 TOP 3
        let topContainer = document.createElement("div");
        topContainer.className = "commanderTop";

        top.forEach(c => {
          let total = c.wins + c.losses;
          let wr = total ? ((c.wins / total) * 100).toFixed(1) : 0;

          topContainer.innerHTML += `
      <div class="commanderCard ${selectedCommanders.has(c.id) ? 'selectedDelete' : ''}" onclick="selectCommander(${c.id})">
        <img src="${c.image}">
        <div>${c.name}</div>
        <div>${c.wins}W / ${c.losses}L</div>
        <div>${wr}%</div>
      </div>
    `;
        });

        div.appendChild(topContainer);

        // 🃏 RESTO
        let grid = document.createElement("div");
        grid.className = "commanderGrid";

        rest.forEach(c => {
          let total = c.wins + c.losses;
          let wr = total ? ((c.wins / total) * 100).toFixed(1) : 0;

          grid.innerHTML += `
      <div class="commanderCard ${selectedCommanders.has(c.id) ? 'selectedDelete' : ''}" onclick="selectCommander(${c.id})">
        <img src="${c.image}">
        <div style="font-size:12px">${c.name}</div>
        <div style="font-size:11px">${wr}%</div>
      </div>
    `;
        });

        div.appendChild(grid);
      }

      function renderHistory() {
        let div = document.getElementById("history");
        div.innerHTML = "";

        games.slice().reverse().forEach(g => {
          div.innerHTML += `
      <div class="small">
        ${g.date}
        <button onclick="deleteGame(${g.id})" style="float:right">🗑</button>
      </div>
    `;

          g.players.forEach(p => {
            div.innerHTML += `<div>${p.player} - ${p.commander} ${p.result ? "🏆" : ""}</div>`;
          });

          div.innerHTML += "<hr>";
        });
      }

      function deleteGame(id) {
        if (!confirm("¿Eliminar esta partida?")) return;

        let game = games.find(g => g.id === id);
        if (!game) return;

        game.players.forEach(p => {
          let player = players.find(x => x.id === p.playerId) || players.find(x => x.name === p.player);
          let cmd = commanders.find(c => c.id == p.commanderId);

          if (!cmd && p.commander) {
            cmd = commanders.find(c => c.name === p.commander);
          }

          if (cmd) {
            if (p.result) cmd.wins = Math.max(0, cmd.wins - 1);
            else cmd.losses = Math.max(0, cmd.losses - 1);
          }

          if (player) {
            if (p.result) player.wins = Math.max(0, player.wins - 1);
            else player.losses = Math.max(0, player.losses - 1);
          }

          if (cmd) {
            if (p.result) cmd.wins = Math.max(0, cmd.wins - 1);
            else cmd.losses = Math.max(0, cmd.losses - 1);
          }
        });

        games = games.filter(g => g.id !== id);

        save();
        render();
      }

      function deleteCommander(id) {
        if (!confirm("¿Borrar este comandante?")) return;
        commanders = commanders.filter(c => c.id !== id);
        save(); render();
      }

      function exportData() {
        const data = { players, commanders, games };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "mtg-tracker.json"; a.click();
      }

      function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const data = JSON.parse(e.target.result);
          players = data.players || [];
          commanders = data.commanders || [];
          games = data.games || [];
          save(); render();
        };
        reader.readAsText(file);
      }

      let debounceTimer;
      function searchCommander() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const query = commanderName.value;
          const box = document.getElementById("suggestions");
          if (query.length < 2) { box.innerHTML = ""; return; }
          fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`)
            .then(r => r.json())
            .then(data => {
              const box = document.getElementById("suggestions");
              box.innerHTML = "";
              data.data.slice(0, 5).forEach(name => {
                const div = document.createElement("div");
                div.textContent = name;
                div.style.cursor = "pointer";
                div.style.padding = "6px";
                div.onclick = () => { commanderName.value = name; box.innerHTML = ""; };
                box.appendChild(div);
              });
            });
        }, 250);
      }

      function selectCommander(id) {
        if (!deleteMode) return;

        if (selectedCommanders.has(id)) {
          selectedCommanders.delete(id);
        } else {
          selectedCommanders.add(id);
        }

        render();
      }

      render();
    </script>

</body>

</html>
